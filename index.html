<title>Auto Money CRM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Segoe UI,sans-serif;background:#f1f5f9;color:#1e293b;}
.hidden{display:none!important;}
.lbg{min-height:100vh;background:linear-gradient(135deg,#1e293b,#0f172a,#14532d);display:flex;align-items:center;justify-content:center;}
.lbox{background:white;border-radius:20px;padding:40px;width:360px;box-shadow:0 25px 80px rgba(0,0,0,.4);}
.llogo{text-align:center;margin-bottom:28px;}
.llogo p{color:#64748b;font-size:14px;margin-top:8px;}
.lf label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;}
.lf input,.lf select{width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;margin-bottom:14px;font-family:inherit;outline:none;}
.lbtn{width:100%;padding:13px;background:#22c55e;color:white;border:none;border-radius:10px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;}
.lbtn:hover{background:#16a34a;}

#app{display:flex;min-height:100vh;}
#sidebar{width:240px;background:#1e293b;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:width .25s;overflow:hidden;}
#sidebar.col{width:220px;}
.shead{padding:16px 12px;border-bottom:1px solid #334155;display:flex;flex-direction:column;align-items:center;gap:8px;}
.logowr{display:flex;justify-content:center;width:100%;}
#sidebar.col .uname,#sidebar.col .urole{display:none;}
.menbtn{background:none;border:none;color:#94a3b8;cursor:pointer;padding:4px;align-self:flex-end;}
#sidebar.col .menbtn{align-self:center;}
nav{flex:1;padding:12px 8px;overflow-y:auto;}
.nitem{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:none;background:transparent;color:#94a3b8;cursor:pointer;margin-bottom:2px;transition:all .15s;white-space:nowrap;font-family:inherit;text-align:left;}
.nitem:hover{background:#334155;color:white;}
.nitem.active{background:#22c55e;color:white;}
.nlabel{font-size:14px;font-weight:500;}
.nitem.active .nlabel{font-weight:700;}
#sidebar.col .nitem{justify-content:center;padding:10px;}
.sfoot{padding:12px 8px;border-top:1px solid #334155;}
.urow{display:flex;align-items:center;gap:10px;padding:8px 12px;}
.uav{width:32px;height:32px;border-radius:50%;background:#22c55e30;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#22c55e;flex-shrink:0;}
.lgbtn{width:100%;display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;border:none;background:transparent;color:#64748b;cursor:pointer;font-size:13px;font-family:inherit;}
.lgbtn:hover{color:white;}
#sidebar.col .lgbtn{justify-content:center;}
#main{margin-left:240px;transition:margin-left .25s;flex:1;display:flex;flex-direction:column;}
#main.exp{margin-left:64px;}
.topbar{background:white;border-bottom:1px solid #e5e7eb;padding:12px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.content{padding:28px;flex:1;}
.page{display:none;}
.page.active{display:block;}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.ptitle{font-size:22px;font-weight:800;}
.psub{font-size:14px;color:#64748b;margin-top:4px;}
.btn{display:inline-flex;align-items:center;gap:6px;border-radius:8px;cursor:pointer;font-weight:600;white-space:nowrap;border:none;font-family:inherit;}
.btnp{background:#22c55e;color:white;padding:10px 20px;font-size:14px;}
.btns{background:white;color:#374151;padding:10px 20px;font-size:14px;border:1.5px solid #e5e7eb!important;}
.btnd{background:#fee2e2;color:#dc2626;padding:7px 10px;font-size:13px;}
.btng{background:none;color:#64748b;padding:7px 8px;font-size:13px;}
.btn:hover{opacity:.85;}
.tw{background:white;border-radius:12px;border:1px solid #e5e7eb;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.tbar{padding:16px 20px;border-bottom:1px solid #f1f5f9;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{padding:12px 16px;text-align:left;font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #e5e7eb;white-space:nowrap;background:#f8fafc;}
td{padding:12px 16px;border-bottom:1px solid #f1f5f9;white-space:nowrap;color:#1e293b;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:#f8fafc;}
.bk{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;}
.bg{background:#dcfce7;color:#15803d;}

.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:24px;}

.tpills{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}

.pb{height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden;margin-top:4px;}

}
</style>

// ============================================================
// SUPABASE CONFIG - substitua pelos seus valores
// ============================================================
var SUPA_URL = 'https://zpmjhtanbxegtjybyvtn.supabase.co';   // ex: https://xyzabc.supabase.co
var SUPA_KEY = 'sb_publishable_-3gsXaOaEA4x_Da4tpO-sw_8zZBUX5u';   // anon public key

// ============================================================
// SUPABASE API - camada de acesso ao banco
// ============================================================
function supaHeaders() {
  return {
    'Content-Type': 'application/json',
    'apikey': SUPA_KEY,
    'Authorization': 'Bearer ' + SUPA_KEY,
    'Prefer': 'return=representation'
  };
}

function supaGet(table, params) {
  var url = SUPA_URL + '/rest/v1/' + table + '?order=created_at.asc';
  if (params) url += '&' + params;
  return fetch(url, { headers: supaHeaders() }).then(function(r) { return r.json(); });
}

function supaInsert(table, data) {
  return fetch(SUPA_URL + '/rest/v1/' + table, {
    method: 'POST',
    headers: supaHeaders(),
    body: JSON.stringify(data)
  }).then(function(r) { return r.json(); });
}

function supaUpdate(table, id, data) {
  return fetch(SUPA_URL + '/rest/v1/' + table + '?id=eq.' + id, {
    method: 'PATCH',
    headers: supaHeaders(),
    body: JSON.stringify(data)
  }).then(function(r) { return r.json(); });
}

function supaDelete(table, id) {
  return fetch(SUPA_URL + '/rest/v1/' + table + '?id=eq.' + id, {
    method: 'DELETE',
    headers: supaHeaders()
  });
}

function supaLogin(username, pass) {
  return fetch(SUPA_URL + '/rest/v1/system_users?username=eq.' + username + '&password_hash=eq.' + pass + '&select=username,role', {
    headers: supaHeaders()
  }).then(function(r) { return r.json(); });
}

// Verifica se Supabase esta configurado
function supaConfigured() {
  return SUPA_URL !== '' && SUPA_KEY !== '';
}

// ============================================================
// CARREGAMENTO DOS DADOS
// ============================================================
function loadAllData(callback) {
  if (!supaConfigured()) {
    // Modo offline - usa dados locais do DB
    callback();
    return;
  }
  showLoading(true);
  Promise.all([
    supaGet('vehicles'),
    supaGet('clients'),
    supaGet('sales'),
    supaGet('expenses'),
    supaGet('employees'),
    supaGet('payment_logs'),
    supaGet('leads'),
    supaGet('appointments'),
    supaGet('suppliers')
  ]).then(function(results) {
    if (results[0] && !results[0].error) DB.vehicles    = results[0].map(mapVehicle);
    if (results[1] && !results[1].error) DB.clients     = results[1].map(mapClient);
    if (results[2] && !results[2].error) DB.sales       = results[2].map(mapSale);
    if (results[3] && !results[3].error) DB.expenses    = results[3].map(mapExpense);
    if (results[4] && !results[4].error) DB.employees   = results[4].map(mapEmployee);
    if (results[5] && !results[5].error) DB.payLogs     = results[5].map(mapPayLog);
    if (results[6] && !results[6].error) DB.leads       = results[6].map(mapLead);
    if (results[7] && !results[7].error) DB.appointments = results[7].map(mapAppt);
    if (results[8] && !results[8].error) DB.suppliers   = results[8].map(mapSupplier);
    showLoading(false);
    callback();
  }).catch(function(e) {
    console.error('Erro ao carregar dados:', e);
    showLoading(false);
    callback();
  });
}

  var list = document.getElementById('debts-list');
  if (!list) return [];
  var rows = list.children;
  var debts = [];
  for (var i = 0; i < rows.length; i++) {
    var desc = document.getElementById('dbt-desc-' + i);

function doLogin() {
  var u = document.getElementById('sel-user').value;
  var p = document.getElementById('inp-pass').value;

  function enterApp(username, role) {
    CUR.user = username;
    CUR.role = role;
    document.getElementById('login-page').classList.add('hidden');
    var appEl = document.getElementById('app');
    appEl.classList.remove('hidden');
    appEl.style.display = 'flex';
    document.getElementById('user-av').textContent = username[0];
    document.getElementById('top-av').textContent = username[0];
    document.getElementById('user-nm').textContent = username;
    document.getElementById('user-rl').textContent = role;
    document.getElementById('top-date').textContent = new Date().toLocaleDateString('pt-BR');
    loadAllData(function() {
      buildNav();
      showPage('dashboard');
      checkMonthlyPayroll();
    });
  }

  if (supaConfigured()) {
    // Login via Supabase
    var btn = document.getElementById('btn-login');
    btn.textContent = 'Entrando...';
    btn.disabled = true;
    supaLogin(u, p).then(function(result) {
      btn.textContent = 'Entrar';
      btn.disabled = false;
      if (result && result.length > 0) {
        var rawRole = (result[0].role || '').toLowerCase();
        var normRole = rawRole === 'gestora' ? 'gestor' : rawRole;
        enterApp(result[0].username, normRole);
      } else {
        alert('Senha incorreta.');
      }
    }).catch(function() {
      btn.textContent = 'Entrar';
      btn.disabled = false;
      alert('Erro de conexao. Tente novamente.');
    });
  } else {
    // Modo offline (sem Supabase configurado)
    if (!USERS[u]) { alert('Usuario invalido.'); return; }
    if (p !== USERS[u].pass && p !== '') { alert('Senha incorreta.'); return; }
    enterApp(u, USERS[u].role);
  }
}

}

function svgIcon(name, size, color) {
  size = size || 18; color = color || 'currentColor';
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="' + (ICONS[name] || '') + '"/></svg>';
}

function buildNav() {
  var h = '';
  NAV.forEach(function(n) {
    var ok = isG() || n.roles.indexOf(CUR.role) > -1;
    if (!ok) return; // hide restricted items completely
    var ac = CUR.page === n.id ? ' active' : '';
    h += '<button class="nitem' + ac + '" onclick="showPage(\'' + n.id + '\')" title="' + n.label + '">';
    h += svgIcon(n.id, 18);
    h += '<span class="nlabel">' + n.label + '</span>';
    h += '</button>';
  });
  document.getElementById('nav-items').innerHTML = h;
}

// ---------- PAGES ----------
function showPage(id) {
  CUR.page = id;
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  var pg = document.getElementById('p-' + id);
  if (pg) pg.classList.add('active');
  var n = NAV.find(function(x) { return x.id === id; });
  if (n) document.getElementById('page-title').textContent = n.label;
  buildNav();
  var fns = { dashboard: rDash, vehicles: rVehicles, clients: rClients, leads: rLeads, sales: rSales, financial: rFinancial, employees: rEmployees, despachante: rDesp, agenda: rAgenda, suppliers: rSup, reports: rReports };
  if (fns[id]) fns[id]();
}

// ---------- MODAL ----------
function openModal(html, size, setupFn) {
  var d = document.createElement('div');
  d.className = 'modal-bg';
  d.id = 'modal-bg';
  d.innerHTML = '<div class="modal ' + (size || 'modal-md') + '">' + html + '</div>';
  document.getElementById('modal-wrap').innerHTML = '';
  document.getElementById('modal-wrap').appendChild(d);
  if (setupFn) setTimeout(setupFn, 50);
}
function closeModal() { document.getElementById('modal-wrap').innerHTML = ''; }
function mHead(t) {
  return '<div class="modal-head"><h3>' + t + '</h3><button class="btn btng" onclick="closeModal()">' + svgIcon('leads', 20) + '</button></div>';
}

// ---------- FORM HELPERS ----------
function finp(id, lbl, val, req, type) {
  return '<div class="fg"><label>' + lbl + (req ? '<span class="req">*</span>' : '') + '</label><input type="' + (type || 'text') + '" id="' + id + '" value="' + (val || '') + '"/></div>';
}
function fsel(id, lbl, val, opts) {
  var s = '<div class="fg"><label>' + lbl + '</label><select id="' + id + '">';
  opts.forEach(function(o) { s += '<option value="' + o + '"' + (o === val ? ' selected' : '') + '>' + o + '</option>'; });
  return s + '</select></div>';
}
function ftxt(id, lbl) {
  return '<div class="fg"><label>' + lbl + '</label><textarea id="' + id + '"><\/textarea></div>';
}

// ---------- STAT CARD ----------
function scard(icon, lbl, val, sub, color) {
  return '<div class="scard"><div class="sicon" style="background:' + color + '20">' + svgIcon(icon, 24, color) + '</div><div><div class="sval">' + val + '</div><div class="slbl">' + lbl + '</div><div class="ssub">' + sub + '</div></div></div>';
}

// ---------- TABLE ----------
function mkTable(cols, rows, actionsFn) {
  var h = '<table><thead><tr>';
  cols.forEach(function(c) { h += '<th>' + c + '</th>'; });
  if (actionsFn) h += '<th style="text-align:right">Acoes</th>';
  h += '</tr></thead><tbody>';
  if (!rows || !rows.length) {
    h += '<tr><td colspan="' + (cols.length + (actionsFn ? 1 : 0)) + '" style="text-align:center;padding:32px;color:#94a3b8">Nenhum registro</td></tr>';
  } else {
    rows.forEach(function(r) {
      h += '<tr>';
      r.cells.forEach(function(c) { h += '<td>' + c + '</td>'; });
      if (actionsFn) h += '<td style="text-align:right">' + actionsFn(r.data) + '</td>';
      h += '</tr>';
    });
  }
  h += '</tbody></table>';
  return h;
}

function saveVeh(id) {
  var brand = gv('vbrand');
  var model = gv('vmodel-sel');
  var plate = gv('vplate');
  var orig = id ? DB.vehicles.find(function(v){ return v.id == id; }) : null;
  if (!brand && orig) brand = orig.brand;
  if (!model && orig) model = orig.model;
  if (!brand) { alert('Selecione a marca.'); return; }
  if (!model) model = brand;
  if (!plate) { alert('Informe a placa.'); return; }

  function toNum(s) {
    if (!s) return 0;
    var clean = String(s).replace(/[^0-9,\.]/g,'');
    if (clean.indexOf(',') > -1 && clean.indexOf('.') > -1) {
      clean = clean.replace(/\./g,'').replace(',','.');
    } else if (clean.indexOf(',') > -1) {
      clean = clean.replace(',','.');
    }
    var n = parseFloat(clean);
    return isNaN(n) ? 0 : n;
  }

  var obj = {
    brand: brand,
    model: model,
    year: parseInt(gv('vyear')) || 0,
    plate: plate.toUpperCase(),
    color: gv('vcolor'),
    chassis: gv('vchassi'),
    renavam: gv('vrenavam'),
    owner: gv('vowner'),
    ownerName: gv('vowner2'),
    entryValue: toNum(gv('ventry')),
    saleValue: toNum(gv('vsale')),
    entryType: gv('vetype'),
    status: gv('vstatus'),
    mileage: parseInt(gv('vmil')) || 0,
    consignadoPor: gv('vconsig') || '',
    debts: getDebts(),
    expenses: orig ? (orig.expenses || 0) : 0
  };

  if (supaConfigured()) {
    var dbObj = {
      brand: obj.brand, model: obj.model, year: obj.year,
      plate: obj.plate, color: obj.color, chassis: obj.chassis,
      renavam: obj.renavam, owner: obj.owner, owner_name: obj.ownerName,
      entry_value: obj.entryValue, sale_value: obj.saleValue,
      entry_type: obj.entryType, status: obj.status, mileage: obj.mileage, consignado_por: obj.consignadoPor
    };
    var prom = id ? supaUpdate('vehicles', id, dbObj) : supaInsert('vehicles', dbObj);
    prom.then(function(r) {
      var saved = Array.isArray(r) ? r[0] : r;
      if (id) {
        DB.vehicles = DB.vehicles.map(function(v) { return v.id == id ? Object.assign({}, v, obj) : v; });
      } else {
        if (saved && saved.id) obj.id = saved.id;
        DB.vehicles.push(obj);
      }
      closeModal(); rVehicles(); if(obj.owner==='Consignado') celebrateConsig();
    }).catch(function(e) {
      console.error('Erro:', e);
      alert('Erro ao salvar. Tente novamente.');
    });
  } else {
    if (id) {
      DB.vehicles = DB.vehicles.map(function(v) { return v.id == id ? Object.assign({}, v, obj) : v; });
    } else {
      obj.id = nextId(DB.vehicles);
      DB.vehicles.push(obj);
    }
    closeModal(); rVehicles();
  }
}
function delVeh(id) {
  if (confirm('Excluir veiculo?')) {
    DB.vehicles = DB.vehicles.filter(function(v) { return v.id != id; });

}

function rSales() {
  var h = '<div class="ph"><div><h2 class="ptitle">Vendas</h2><p class="psub">Registro de vendas</p></div>';
  h += '<button class="btn btnp" onclick="openSaleModal()">+ Registrar Venda</button>';
  h += '</div>';

  h += mkTable(
    ['Data','Veiculo','Cliente','Vendedor','Pagamento','Valor','Status',''],
    DB.sales.map(function(s) {
      var veh = DB.vehicles.find(function(v){ return String(v.id)===String(s.vehicleId); });
      var cli = DB.clients.find(function(c){ return String(c.id)===String(s.clientId); });
      // Build payment summary - skip empty/dash/Despachante
      var payStr = '-';
      if (s.payDetails) {
        var parts = s.payDetails.split('|').map(function(p){ return p.split(':')[0].trim(); }).filter(function(p){ return p && p !== '-' && p !== 'Despachante'; });
        if (parts.length > 0) payStr = parts.join(' + ');
      } else if (s.payMethod && s.payMethod !== '-' && s.payMethod !== 'Despachante') {
        payStr = s.payMethod;
      }
      var statusVal = s.saleStatus || 'Pre-venda';
      return {
        cells: [
          s.saleDate,
          veh ? (veh.brand+' '+veh.model+' - '+veh.plate) : '-',
          cli ? cli.name : '-',
          s.seller || '-',
          '<span style="font-size:12px;color:#374151">'+payStr+'</span>',
          s.saleValue > 0 ? '<span style="color:#22c55e;font-weight:700">'+fmt(s.saleValue)+'</span>' : '-',
          bk(statusVal, statusVal==='Vendido'?'bg':'by'),
          '<div style="display:flex;gap:4px">'
            + '<button class="btn btns" style="font-size:11px;padding:4px 8px" data-sid="'+s.id+'" onclick="toggleSaleStatus(this.getAttribute(\'data-sid\'))">Status</button>'
            + '<button class="btn btnp" style="font-size:11px;padding:4px 8px;background:#3b82f6" data-sid="'+s.id+'" onclick="openEditSale(this.getAttribute(\'data-sid\'))">Editar</button>'
            + '</div>'
        ],
        data: s
      };
    })
  );

  document.getElementById('p-sales').innerHTML = h;
}

  h += '<label style="flex:1;display:flex;align-items:center;gap:8px;padding:12px;border:2px solid #22c55e;border-radius:10px;cursor:pointer;background:#f0fdf4" id="trl-cliente">';

  h += '<input type="radio" name="sale-transf" value="Cortesia" style="accent-color:#3b82f6"> <div><div style="font-weight:700;font-size:14px"> Cortesia</div><div style="font-size:12px;color:#64748b">Loja paga a transferencia</div></div></label>';

function selMidia(btn) {
  document.querySelectorAll('.midia-btn').forEach(function(b){
    b.style.borderColor = '#e5e7eb';
    b.style.background = 'white';
    b.style.color = '#374151';
  });
  btn.style.borderColor = '#22c55e';
  btn.style.background = '#f0fdf4';
  btn.style.color = '#15803d';
  var el = document.getElementById('sale-midia');
  if (el) el.value = btn.getAttribute('data-val');
}

function onVehSelect(sel) {
  var opt = sel.options[sel.selectedIndex];
  var val = opt ? parseFloat(opt.getAttribute('data-val')) || 0 : 0;
  window._saleTotal = val;
  document.getElementById('sv-total').textContent = fmt(val);
  updateSaldo();
  // Commission preview
  var commEl = document.getElementById('comm-prv');
  if (commEl && val > 0) {
    commEl.style.display = 'block';
    commEl.innerHTML = 'Comissao calculada: <strong>' + fmt(calcComm(val)) + '</strong> (ate R$50.000 = R$500 | acima = 1%)';
  }
}

function addPayRow() {
  var PMETS = ['Pix/TED/Transferencia','Dinheiro','Financiamento','Carro na Troca','Cheque','Consorcio','Parcelado Loja','Sinal'];
  if (!window._payRows) window._payRows = [];
  var rowId = Date.now();
  window._payRows.push({ id: rowId, method: '', value: 0, bank: '', details: '' });

  var container = document.getElementById('pay-rows');
  if (!container) return;

  var row = document.createElement('div');
  row.id = 'pr-' + rowId;
  row.style.cssText = 'background:#f8fafc;border:1.5px solid #e5e7eb;border-radius:10px;padding:14px;margin-bottom:10px';

  var mOpts = PMETS.map(function(m){ return '<option value="'+m+'">'+m+'</option>'; }).join('');

  row.innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end">'
    + '<div class="fg" style="margin:0"><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px">Forma</label>'
    + '<select onchange="onPayMethod('+rowId+',this.value)" style="width:100%;padding:8px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;font-family:inherit"><option value="">Selecione...</option>'+mOpts+'</select></div>'
    + '<div class="fg" style="margin:0"><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px">Valor R$</label>'
    + '<input type="text" id="pv-'+rowId+'" placeholder="0" oninput="onPayValue('+rowId+',this.value)" style="width:100%;padding:8px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;font-family:inherit"/></div>'
    + '<button onclick="removePayRow('+rowId+')" style="background:#fee2e2;color:#dc2626;border:none;border-radius:8px;padding:8px 10px;cursor:pointer;font-size:16px;margin-bottom:0">x</button></div>'
    + '<div id="pd-'+rowId+'" style="margin-top:8px"></div>';

  container.appendChild(row);
}

function onPayMethod(rowId, method) {
  if (!window._payRows) return;
  var row = window._payRows.find(function(r){ return r.id == rowId; });
  if (row) row.method = method;

  var detDiv = document.getElementById('pd-' + rowId);
  if (!detDiv) return;
  detDiv.innerHTML = '';

  if (method === 'Financiamento') {
    detDiv.innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:4px">'
      + '<div><label style="font-size:11px;font-weight:600;color:#64748b;display:block;margin-bottom:3px">Banco</label><input type="text" id="pb-'+rowId+'" placeholder="Ex: Santander" oninput="window._bankName=this.value" style="width:100%;padding:7px;border:1.5px solid #e5e7eb;border-radius:6px;font-size:12px;font-family:inherit"/></div>'
      + '<div><label style="font-size:11px;font-weight:600;color:#64748b;display:block;margin-bottom:3px">Prazo (meses)</label><input type="text" id="pp-'+rowId+'" placeholder="Ex: 60" style="width:100%;padding:7px;border:1.5px solid #e5e7eb;border-radius:6px;font-size:12px;font-family:inherit"/></div>'
      + '<div><label style="font-size:11px;font-weight:600;color:#64748b;display:block;margin-bottom:3px">Parcela R$</label><input type="text" id="ppa-'+rowId+'" placeholder="Ex: 1500" style="width:100%;padding:7px;border:1.5px solid #e5e7eb;border-radius:6px;font-size:12px;font-family:inherit"/></div>'
      + '<div><label style="font-size:11px;font-weight:600;color:#1d4ed8;display:block;margin-bottom:3px">Retorno % (sobre financiado)</label>'
      + '<input type="text" id="prt-'+rowId+'" placeholder="Ex: 3" oninput="calcRetorno('+rowId+',this.value)" style="width:100%;padding:7px;border:1.5px solid #3b82f6;border-radius:6px;font-size:12px;font-family:inherit"/>'
      + '<div id="prt-val-'+rowId+'" style="font-size:11px;color:#1d4ed8;margin-top:3px;font-weight:600"></div></div>'
      + '</div>';
  } else if (method === 'Carro na Troca') {
    detDiv.innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:4px">'
      + '<div><label style="font-size:11px;font-weight:600;color:#64748b;display:block;margin-bottom:3px">Veiculo</label><input type="text" id="ptr-'+rowId+'" placeholder="Ex: Gol 2018" style="width:100%;padding:7px;border:1.5px solid #e5e7eb;border-radius:6px;font-size:12px;font-family:inherit"/></div>'
      + '<div><label style="font-size:11px;font-weight:600;color:#64748b;display:block;margin-bottom:3px">Placa</label><input type="text" id="ppl-'+rowId+'" placeholder="Ex: ABC-1234" style="width:100%;padding:7px;border:1.5px solid #e5e7eb;border-radius:6px;font-size:12px;font-family:inherit"/></div>'
      + '<div><label style="font-size:11px;font-weight:600;color:#64748b;display:block;margin-bottom:3px">Valor Avaliado R$</label><input type="text" id="pav-'+rowId+'" placeholder="Ex: 25000" style="width:100%;padding:7px;border:1.5px solid #e5e7eb;border-radius:6px;font-size:12px;font-family:inherit" oninput="syncTroca('+rowId+',this.value)"/></div>'
      + '</div>';
  }
}

function onPayValue(rowId, val) {
  if (!window._payRows) return;
  var row = window._payRows.find(function(r){ return r.id == rowId; });
  var n = parseFloat(String(val||0).replace(',','.')) || 0;
  if (row) row.value = n;
  updateSaldo();
}

function removePayRow(rowId) {
  window._payRows = (window._payRows||[]).filter(function(r){ return r.id != rowId; });
  var el = document.getElementById('pr-' + rowId);
  if (el) el.remove();
  updateSaldo();
}



function calcRetorno(rowId, pct) {
  var pvEl = document.getElementById('pv-' + rowId);
  var finVal = pvEl ? parseFloat(String(pvEl.value||0).replace(',','.')) || 0 : 0;
  var p = parseFloat(String(pct||0).replace(',','.')) || 0;
  var retorno = finVal * p / 100;
  window._bankRetorno = retorno;
  var dispEl = document.getElementById('prt-val-' + rowId);
  if (dispEl) dispEl.textContent = retorno > 0 ? 'Retorno: ' + fmt(retorno) : '';
}

function syncTroca(rowId, val) {
  var pvEl = document.getElementById('pv-' + rowId);
  if (pvEl) { pvEl.value = val; onPayValue(rowId, val); }
}

function updateSaldo() {
  var total = window._saleTotal || 0;
  var paid = (window._payRows||[]).reduce(function(a,r){ return a + (r.value||0); }, 0);
  var saldo = total - paid;
  var saldoEl = document.getElementById('sv-saldo');
  if (saldoEl) {
    saldoEl.textContent = fmt(saldo);
    saldoEl.style.color = saldo <= 0 ? '#22c55e' : '#ef4444';
  }
}

function saveSale2() {
  var vId = gv('sv'), cId = gv('sc');
  if (!vId || !cId) { alert('Selecione veiculo e cliente.'); return; }
  var total = window._saleTotal || 0;
  var rows = window._payRows || [];
  if (!rows.length) { alert('Adicione pelo menos uma forma de pagamento.'); return; }

  // Build payment details string
  var payDetails = rows.map(function(r){
    var det = r.method;
    var bank = document.getElementById('pb-'+r.id) ? document.getElementById('pb-'+r.id).value : '';
    var prazo = document.getElementById('pp-'+r.id) ? document.getElementById('pp-'+r.id).value : '';
    var parcela = document.getElementById('ppa-'+r.id) ? document.getElementById('ppa-'+r.id).value : '';
    var retornoPct = document.getElementById('prt-'+r.id) ? document.getElementById('prt-'+r.id).value : '';
    var retorno = retornoPct ? retornoPct + '%' : '';
    if (bank) window._bankName = bank;
    var troca = document.getElementById('ptr-'+r.id) ? document.getElementById('ptr-'+r.id).value : '';
    var placa = document.getElementById('ppl-'+r.id) ? document.getElementById('ppl-'+r.id).value : '';
    if (bank) det += ' - ' + bank;
    if (prazo) det += ' ' + prazo + 'x';
    if (parcela) det += ' de R$' + parcela;
    if (retorno) det += ' (retorno: R$' + retorno + ')';
    if (troca) det += ': ' + troca;
    if (placa) det += ' ' + placa;
    return det + ': ' + fmt(r.value);
  }).join(' | ');

  var primaryMethod = rows[0] ? rows[0].method : 'Diversos';
  var transfEl = document.querySelector('input[name="sale-transf"]:checked');
  var midia = gv('sale-midia') || '';
  var transf = transfEl ? transfEl.value : 'Cliente';
  var obj = {
    vehicleId: vId, clientId: cId, seller: gv('ssel'),
    saleDate: gv('sdate'), saleValue: total,
    payMethod: primaryMethod, payDetails: payDetails, midia: midia,
    bankName: '', commission: calcComm(total),
    transferType: transf, desp: 'Aguardando', status: 'Em andamento'
  };

  if (supaConfigured()) {
    var dbObj = {
      vehicle_id: vId, client_id: cId, seller: obj.seller,
      sale_date: obj.saleDate, sale_value: obj.saleValue,
      pay_method: obj.payMethod, commission: obj.commission,
      transfer_type: obj.transferType, despachante: obj.desp, status: obj.status
    };
    supaInsert('sales', dbObj).then(function(r) {
      var saved = Array.isArray(r) ? r[0] : r;
      if (saved && saved.id) obj.id = saved.id;
      DB.sales.push(obj);
      supaUpdate('vehicles', vId, { status: 'Vendido' });
      DB.vehicles = DB.vehicles.map(function(v){ return v.id==vId ? Object.assign({},v,{status:'Vendido'}) : v; });
      // Auto-create commission paylog for seller
      if (obj.seller && obj.commission > 0) {
        var veh2 = DB.vehicles.find(function(v){ return String(v.id)===String(vId); });
        var commLog = {
          employee_name: obj.seller,
          date: obj.saleDate,
          description: 'Comissao venda ' + (veh2 ? veh2.plate : '') + ' - PENDENTE',
          value: obj.commission,
          type: 'Comissao'
        };
        supaInsert('payment_logs', commLog).then(function(lr) {
          var lsaved = Array.isArray(lr) ? lr[0] : lr;
          var localLog = { id: lsaved ? lsaved.id : nextId(DB.payLogs), emp: obj.seller, date: obj.saleDate, desc: commLog.description, value: obj.commission, type: 'Comissao', status: 'Pendente' };
          DB.payLogs.push(localLog);
        });
      }
      // Auto-create bank return as income if retorno > 0
      if (window._bankRetorno > 0) {
        var veh3 = DB.vehicles.find(function(v){ return String(v.id)===String(vId); });
        var retLog = {
          category: 'Retorno Banco',
          description: 'Retorno financiamento ' + (window._bankName||'') + ' - ' + (veh3 ? veh3.plate : ''),
          value: window._bankRetorno,
          date: obj.saleDate,
          type: 'Retorno Banco',
          paid: 'Pendente'
        };
        supaInsert('expenses', retLog).then(function(er) {
          var esaved = Array.isArray(er) ? er[0] : er;
          retLog.id = esaved ? esaved.id : nextId(DB.expenses);
          retLog.cat = retLog.category; retLog.desc = retLog.description;
          DB.expenses.push(retLog);
        });
      }
      closeModal(); rSales(); celebrateSale();
    });
  } else {
    obj.id = nextId(DB.sales);
    DB.sales.push(obj);
    DB.vehicles = DB.vehicles.map(function(v){ return v.id==vId ? Object.assign({},v,{status:'Vendido'}) : v; });
    // Auto commission log
    if (obj.seller && obj.commission > 0) {
      var vehX = DB.vehicles.find(function(v){ return String(v.id)===String(vId); });
      DB.payLogs.push({ id: nextId(DB.payLogs), emp: obj.seller, date: obj.saleDate, desc: 'Comissao venda ' + (vehX ? vehX.plate : '') + ' - PENDENTE', value: obj.commission, type: 'Comissao', status: 'Pendente' });
    }
    if (window._bankRetorno > 0) {
      var vehY = DB.vehicles.find(function(v){ return String(v.id)===String(vId); });
      DB.expenses.push({ id: nextId(DB.expenses), cat: 'Retorno Banco', desc: 'Retorno ' + (window._bankName||'') + ' - ' + (vehY ? vehY.plate : ''), value: window._bankRetorno, date: obj.saleDate, type: 'Retorno Banco', paid: 'Pendente' });
    }
    closeModal(); rSales(); celebrateSale();
  }
}

var finTab = 'saidas';
var ECATS = ['Aluguel','Agua/Luz/Internet','Material Escritorio','Preparacao','Funcionarios','Aj. Custo','Comissao','Portal WebMotors','Portal OLX','Portal Mercado Livre','Portal BV Pista','Portal C6 UsadosBR','Portal Santander','Portal Pan MobiAuto','Portal Revenda Mais','Portal Chaves na Mao','Despachante','Pericia/Laudo','Oficina','Lataria/Pintura','Eletrica','Impressora','Outros'];


function baixarComissao(logId) {
  var today = new Date().toLocaleDateString('pt-BR');
  DB.payLogs = DB.payLogs.map(function(l){
    if (String(l.id) === String(logId)) {
      var newDesc = l.desc.replace(' - PENDENTE','') + ' - PAGO em ' + today;
      var updated = Object.assign({}, l, { status: 'Pago', desc: newDesc });
      if (supaConfigured()) {
        supaUpdate('payment_logs', logId, { description: newDesc });
      }
      return updated;
    }
    return l;
  });
  // Refresh whichever page is showing
  if (isG()) {
    empTab2 = 'extrato';
    rEmployees();
    finTab = 'apagar';
    rFinancial();
  } else {
    rFinancial();
  }
}

function rFinancialPessoal() {
  var myLogs = DB.payLogs.filter(function(l){ return l.emp === CUR.user; });
  var pending = myLogs.filter(function(l){ return l.status === 'Pendente' || (l.desc && l.desc.indexOf('PENDENTE') > -1); });
  var paid = myLogs.filter(function(l){ return l.status !== 'Pendente' && (!l.desc || l.desc.indexOf('PENDENTE') === -1); });
  var totalPending = pending.reduce(function(a,l){ return a + l.value; }, 0);
  var totalPaid = paid.reduce(function(a,l){ return a + l.value; }, 0);

  var h = '<div class="ph"><div><h2 class="ptitle">Meu Financeiro</h2><p class="psub">Seus lancamentos - ' + CUR.user + '</p></div></div>';

  h += '<div class="sg" style="grid-template-columns:repeat(2,1fr);margin-bottom:24px">';
  h += '<div class="scard"><div class="sicon" style="background:#f59e0b20"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><path d="'+ICONS.sales+'"/></svg></div><div><div class="sval" style="color:#f59e0b">'+fmt(totalPending)+'</div><div class="slbl">A Receber (Pendente)</div></div></div>';
  h += '<div class="scard"><div class="sicon" style="background:#22c55e20"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><path d="'+ICONS.sales+'"/></svg></div><div><div class="sval" style="color:#22c55e">'+fmt(totalPaid)+'</div><div class="slbl">Ja Recebido</div></div></div>';
  h += '</div>';

  // A Receber
  h += '<h3 style="font-size:16px;font-weight:700;margin-bottom:12px;color:#f59e0b">A Receber</h3>';
  h += '<div class="tw" style="margin-bottom:20px">';
  var tc = {'Salario':'bb','Aj.Custo':'bgr','Comissao':'bg','Retirada':'by','Vale':'bo','Outros':'bgr'};
  if (pending.length === 0) {
    h += '<div style="padding:24px;text-align:center;color:#94a3b8">Nenhum valor pendente</div>';
  } else {
    h += mkTable(['Data','Descricao','Tipo','Valor'],
      pending.slice().sort(function(a,b){ return b.date.localeCompare(a.date); }).map(function(l){
        var p = l.date.split('-');
        return { cells: [p[2]+'/'+p[1]+'/'+p[0], l.desc, bk(l.type, tc[l.type]||'bgr'), '<span style="color:#f59e0b;font-weight:700">'+fmt(l.value)+'</span>'], data: l };
      })
    );
  }
  h += '</div>';

  // Ja Recebido
  h += '<h3 style="font-size:16px;font-weight:700;margin-bottom:12px;color:#22c55e">Ja Recebido</h3>';
  h += '<div class="tw">';
  if (paid.length === 0) {
    h += '<div style="padding:24px;text-align:center;color:#94a3b8">Nenhum lancamento pago</div>';
  } else {
    h += mkTable(['Data','Descricao','Tipo','Valor'],
      paid.slice().sort(function(a,b){ return b.date.localeCompare(a.date); }).map(function(l){
        var p = l.date.split('-');
        return { cells: [p[2]+'/'+p[1]+'/'+p[0], l.desc, bk(l.type, tc[l.type]||'bgr'), '<span style="color:#22c55e;font-weight:700">'+fmt(l.value)+'</span>'], data: l };
      })
    );
  }
  h += '</div>';

  document.getElementById('p-financial').innerHTML = h;
}

function rFinancial() {
  if (!isG()) { rFinancialPessoal(); return; }
  var rev = DB.sales.reduce(function(a,s) { return a + s.saleValue; }, 0);
  var exp = DB.expenses.reduce(function(a,e) { return a + e.value; }, 0);
  var h = '<div class="ph"><div><h2 class="ptitle">Financeiro</h2><p class="psub">Entradas, saidas e resultado</p></div></div>';
  h += '<div class="sg" style="grid-template-columns:repeat(3,1fr)">';
  h += scard('sales','Receita Total',fmt(rev),'Vendas','#22c55e');
  h += scard('financial','Despesas Total',fmt(exp),'Total','#ef4444');
  h += scard('dashboard','Resultado',fmt(rev-exp),'Lucro/Prejuizo',rev-exp>=0?'#22c55e':'#ef4444');
  h += '</div>';
  h += '<div class="tpills">';
  [['saidas','Saidas'],['entradas','Receitas'],['bancos','Retorno Bancos']].forEach(function(t) {
    h += '<button class="tpill'+(finTab===t[0]?' active':'')+'" onclick="finTab=\''+t[0]+'\';rFinancial()">'+t[1]+'</button>';
  });
  h += '</div>';
  if (finTab === 'saidas') {
    h += '<div class="tw"><div class="tbar" style="justify-content:flex-end"><button class="btn btnp" onclick="openExpModal()">+ Lancamento</button></div>';
    h += mkTable(['Data','Categoria','Descricao','Tipo','Valor','Status'], DB.expenses.map(function(e) {
      return { cells: [e.date, e.cat, e.desc, e.type, '<span style="color:#ef4444;font-weight:700">'+fmt(e.value)+'</span>', bk(e.paid,e.paid==='Pago'?'bg':'by')], data: e };
    }));
    h += '</div>';
  } else if (finTab === 'entradas') {
    h += '<div class="tw">';
    h += mkTable(['Data','Veiculo','Pagamento','Valor','Status'], DB.sales.map(function(s) {
      var veh = DB.vehicles.find(function(v) { return v.id === s.vehicleId; });
      return { cells: [s.saleDate, veh?veh.brand+' '+veh.model:'-', s.payMethod, '<span style="color:#22c55e;font-weight:700">'+fmt(s.saleValue)+'</span>', bk(s.status,s.status==='Concluido'?'bg':'bb')], data: s };
    }));

function inDateRange(dateStr) {
  if (!rptF.dateFrom && !rptF.dateTo) return true;
  if (!dateStr) return false;
  if (rptF.dateFrom && dateStr < rptF.dateFrom) return false;
  if (rptF.dateTo && dateStr > rptF.dateTo) return false;
  return true;
}

function rReports() {

    );
    h += '</div>';
  }

  // ---- POR VEICULO ----
  else if (rptTab === 'veiculo') {
    h += fltBar(['plate']);

    h += '<div id="rpt-content">';

        h += '<div><div style="font-size:11px;color:#64748b;font-weight:700">TRANSFERENCIA</div><div style="font-size:14px;font-weight:600;margin-top:2px">'+sale.transferType+'</div></div>';
        h += '<div><div style="font-size:11px;color:#64748b;font-weight:700">COMISSAO</div><div style="font-size:14px;font-weight:600;margin-top:2px;color:#22c55e">'+fmt(sale.commission)+'</div></div>';
        h += '</div></div>';

      h += '</div>';
    });
    h += '</div>';
  }

  // ---- VENDAS ----
  else if (rptTab === 'vendas') {
    h += fltBar(['dateFrom','dateTo','seller']);

      return inDateRange(s.saleDate) && (!rptF.seller || s.seller===rptF.seller);
    });
    var totalRev2 = sales2.reduce(function(a,s){return a+s.saleValue;},0);

    h += '<div class="scard"><div class="sicon" style="background:#22c55e20"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><path d="'+ICONS.sales+'"/></svg></div><div><div class="sval">'+sales2.length+'</div><div class="slbl">Vendas</div></div></div>';

    h += '</div>';
    h += '<div id="rpt-content" class="tw">';
    h += mkTable(['Data','Veiculo','Cliente','Vendedor','Valor','Status',''],
      sales2.map(function(s){
        var veh=DB.vehicles.find(function(v){return v.id===s.vehicleId;});
        var cli=DB.clients.find(function(c){return c.id===s.clientId;});
        return {cells:[s.saleDate,veh?veh.brand+' '+veh.model+' - '+(veh.plate||''):'-',cli?cli.name:'-',s.seller,'<span style="color:#22c55e;font-weight:700">'+fmt(s.saleValue)+'</span>',bk(s.saleStatus||'Pre-venda',s.saleStatus==='Vendido'?'bg':'by'),'<button class="btn btns" style="font-size:11px;padding:4px 8px" data-sid="'+s.id+'" onclick="toggleSaleStatus(this.getAttribute(\'data-sid\'))">Alterar</button>'],data:s};
      })
    );

  }

    var totalOut2 = expFin.reduce(function(a,e){return a+e.value;},0);

    h += '<div class="sg" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px">';

    h += '<div class="scard"><div class="sicon" style="background:'+(profit2>=0?'#22c55e':'#ef4444')+'20"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="'+(profit2>=0?'#22c55e':'#ef4444')+'" stroke-width="2"><path d="'+ICONS.dashboard+'"/></svg></div><div><div class="sval" style="color:'+(profit2>=0?'#22c55e':'#ef4444')+'">'+fmt(profit2)+'</div><div class="slbl">Resultado</div></div></div>';
    h += '</div>';
    h += '<div id="rpt-content">';
    h += '<h3 style="font-size:15px;font-weight:700;margin-bottom:10px;color:#1e293b">Entradas (Vendas)</h3>';
    h += '<div class="tw" style="margin-bottom:20px">';
    h += mkTable(['Data','Veiculo','Forma Pagamento','Valor'],
      salesFin.map(function(s){var veh=DB.vehicles.find(function(v){return v.id===s.vehicleId;});return {cells:[s.saleDate,veh?veh.brand+' '+veh.model:'-',s.payMethod,'<span style="color:#22c55e;font-weight:700">'+fmt(s.saleValue)+'</span>'],data:s};}));
    h += '</div>';
    h += '<h3 style="font-size:15px;font-weight:700;margin-bottom:10px;color:#1e293b">Saidas (Despesas)</h3>';
    h += '<div class="tw">';
    h += mkTable(['Data','Categoria','Descricao','Tipo','Valor','Status'],
      expFin.map(function(e){return {cells:[e.date,e.cat,e.desc,e.type,'<span style="color:#ef4444;font-weight:700">'+fmt(e.value)+'</span>',bk(e.paid,e.paid==='Pago'?'bg':'by')],data:e};}));
    h += '</div></div>';
  }

  else if (rptTab === 'comissoes') {

    sellers3.forEach(function(emp) {
      var empSales = DB.sales.filter(function(s){return s.seller===emp.name && inDateRange(s.saleDate);});
      var totalC = empSales.reduce(function(a,s){return a+s.commission;},0);
      var totalV = empSales.reduce(function(a,s){return a+s.saleValue;},0);
      var rc={'Gestor':'bg','Gestora':'bg','Vendedor':'bb'};
      h += '<div style="background:white;border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid #e5e7eb;box-shadow:0 1px 4px rgba(0,0,0,.06)">';

      h += '<div><div style="font-size:16px;font-weight:800">'+emp.name+'</div><div style="font-size:13px;color:#64748b">'+emp.role+' | '+empSales.length+' vendas | '+fmt(totalV)+'</div></div></div>';

      if (empSales.length > 0) {
        h += mkTable(['Data','Veiculo','Valor Venda','Comissao','Status'],
          empSales.map(function(s){var veh=DB.vehicles.find(function(v){return v.id===s.vehicleId;});return {cells:[s.saleDate,veh?veh.brand+' '+veh.model+' - '+veh.plate:'-','<strong>'+fmt(s.saleValue)+'</strong>','<span style="color:#22c55e;font-weight:700">'+fmt(s.commission)+'</span>',],data:s};}));

    h += '</div>';
    h += '<div style="background:white;border-radius:12px;padding:16px;border:1px solid #e5e7eb"><h4 style="margin:0 0 12px;font-size:14px;font-weight:700">Por Status</h4>';
    var sc2={'Novo':'#22c55e','Em contato':'#3b82f6','Negociando':'#f59e0b','Agendado':'#8b5cf6','Convertido':'#94a3b8','Perdido':'#ef4444'};
    Object.keys(byS2).forEach(function(s){var pct=leads2.length?(byS2[s]/leads2.length*100):0;h+='<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>'+s+'</span><strong>'+byS2[s]+'</strong></div><div class="pb"><div class="pf" style="width:'+pct+'%;background:'+(sc2[s]||'#94a3b8')+'"></div></div></div>';});
    h += '</div></div>';
    h += '<div id="rpt-content" class="tw">';
    h += mkTable(['Data','Cliente','Telefone','Interesse','Portal','Status','Obs'],
      leads2.map(function(l){return {cells:[l.date,'<strong>'+l.name+'</strong>',l.phone,l.interest,bk(l.portal,'bb'),lbk(l.status),l.notes||'-'],data:l};}));
    h += '</div>';
  }

  // ---- FUNCIONARIOS ----
  else if (rptTab === 'funcionarios') {
    h += fltBar(['dateFrom','dateTo','employee']);
    var emps2 = DB.employees;
    if (rptF.employee) emps2 = emps2.filter(function(e){return e.name===rptF.employee;});
    h += '<div id="rpt-content">';
    emps2.forEach(function(emp) {
      var logs2 = DB.payLogs.filter(function(l){return l.emp===emp.name && inDateRange(l.date);});
      var tot2 = logs2.reduce(function(a,l){return a+l.value;},0);
      var rc2={'Gestor':'bg','Gestora':'bg','Consignadora':'bpu','Vendedor':'bb','Preparador':'bgr'};
      var tc2={'Salario':'bb','Aj.Custo':'bgr','Comissao':'bg','Retirada':'by','Vale':'bo','Outros':'bgr','Comissao-Pendente':'by'};
      h += '<div style="background:white;border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid #e5e7eb;box-shadow:0 1px 4px rgba(0,0,0,.06)">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
      h += '<div style="display:flex;align-items:center;gap:12px"><div style="width:44px;height:44px;border-radius:50%;background:#22c55e20;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#22c55e">'+emp.name[0]+'</div>';
      h += '<div><div style="font-size:16px;font-weight:800">'+emp.name+'</div>'+bk(emp.role,rc2[emp.role]||'bgr')+'</div></div>';
      h += '<div style="text-align:right"><div style="font-size:22px;font-weight:800;color:#22c55e">'+fmt(tot2)+'</div><div style="font-size:12px;color:#64748b">Total recebido</div></div></div>';
      if (logs2.length > 0) {
        h += mkTable(['Data','Descricao','Tipo','Valor',''],
          logs2.slice().sort(function(a,b){return b.date.localeCompare(a.date);}).map(function(l){
            var p=l.date.split('-');

            var payBtn = isG() && isPend

              : (isPend ? bk('Pendente','by') : bk('Pago','bg'));
            return {cells:[p[2]+'/'+p[1]+'/'+p[0],l.desc,bk(l.type,tc2[l.type]||'bgr'),'<span style="color:'+(isPend?'#f59e0b':'#22c55e')+';font-weight:700">'+fmt(l.value)+'</span>',payBtn],data:l};
          }));
      } else {
        h += '<p style="text-align:center;color:#94a3b8;padding:20px">Nenhum lancamento no periodo</p>';
      }
      h += '</div>';
    });
    h += '</div>';
  }

  document.getElementById('p-reports').innerHTML = h;
}


function openDespModal() {
  var vOpts = '<option value="">Selecionar veiculo...</option>' + DB.vehicles.map(function(v){
    return '<option value="'+v.id+'">'+v.plate+' - '+v.brand+' '+v.model+' '+v.year+'</option>';
  }).join('');
  var cOpts = '<option value="">Selecionar cliente...</option>' + DB.clients.map(function(c){
    return '<option value="'+c.id+'">'+c.name+'</option>';
  }).join('');
  var h = mHead('Nova Transferencia - Despachante') + '<div class="modal-body"><div class="fgrid">';
  h += '<div class="fg"><label>Veiculo <span class="req">*</span></label><select id="dv">' + vOpts + '</select></div>';
  h += '<div class="fg"><label>Comprador</label><select id="dc">' + cOpts + '</select></div>';
  h += finp('ddate','Data da Venda',td(),'','date');

function toggleFluxo(saleId, key) {
  var sale = DB.sales.find(function(s){ return String(s.id)===String(saleId); });
  if (!sale) return;
  var fluxo = sale.fluxo ? Object.assign({}, sale.fluxo) : {};
  fluxo[key] = fluxo[key] === 'ok' ? '' : 'ok';

  // Auto-set reconh if both parts done
  var tipoTransf = sale.transferType || 'Cliente';
  if (tipoTransf === 'Cortesia') {
    fluxo.reconh = (fluxo.procuracao==='ok' && fluxo.lojaAssinou==='ok') ? 'ok' : '';
  } else {
    fluxo.reconh = (fluxo.lojaVendedor==='ok' && fluxo.clienteComprador==='ok') ? 'ok' : '';
  }

  DB.sales = DB.sales.map(function(s){ return s.id==saleId ? Object.assign({},s,{fluxo:fluxo}) : s; });
  openFluxo(saleId);
}

function setFluxoTransf(saleId, status) {
  var sale = DB.sales.find(function(s){ return String(s.id)===String(saleId); });
  if (!sale) return;
  var fluxo = sale.fluxo ? Object.assign({}, sale.fluxo) : {};
  fluxo.transferencia = status;
  var despStatus = status==='Concluida'?'Concluido':status==='Em andamento'?'Em andamento':'Aguardando';
  DB.sales = DB.sales.map(function(s){ return s.id==saleId ? Object.assign({},s,{fluxo:fluxo, desp:despStatus}) : s; });
  if (supaConfigured()) supaUpdate('sales', saleId, { despachante:despStatus });
  openFluxo(saleId);
}

    var desc = 'Transferencia ' + (veh ? veh.plate : '') + ' - por conta da Loja';

  if (btn) { btn.textContent = 'Copiado!'; btn.style.background = '#22c55e'; btn.style.color = 'white'; setTimeout(function(){ btn.textContent='Copiar'; btn.style.background=''; btn.style.color=''; }, 2000); }
}


function openAtpv(saleId) {
  var sale = DB.sales.find(function(s){ return String(s.id)===String(saleId); });
  if (!sale) return;
  var veh = DB.vehicles.find(function(v){ return String(v.id)===String(sale.vehicleId); });
  var cli = DB.clients.find(function(c){ return String(c.id)===String(sale.clientId); });

  var vNome    = veh ? (veh.brand + ' ' + veh.model) : '___';
  var vPlaca   = veh ? veh.plate : '___';
  var vRenavam = veh ? (veh.renavam || '___') : '___';
  var vKm      = veh ? (veh.mileage || '___') : '___';
  var vValor   = sale.saleValue > 0 ? fmt(sale.saleValue) : '___';
  var cNome    = cli ? cli.name : '___';
  var cCpf     = cli ? (cli.cpf || '___') : '___';
  var cEmail   = cli ? (cli.email || '') : '';
  var cEnd     = cli ? (cli.address || '___') : '___';
  var cCidade  = cli ? (cli.city || '___') : '___';

  var texto = 'IDENTIFICACAO DO VEICULO: ' + vNome + '\nPLACA: ' + vPlaca + '\nRENAVAM: ' + vRenavam + '\nNumero CRV: ___\nODOMETRO (KM): ' + vKm + '\nVALOR DA VENDA: ' + vValor + '\n\nIDENTIFICACAO DO COMPRADOR - ' + vNome + '\nNOME: ' + cNome + '\nCPF/CNPJ: ' + cCpf + '\nEMAIL: ' + cEmail + '\nENDERECO: ' + cEnd + '\nCIDADE: ' + cCidade;

























  var h = mHead('ATPV - ' + vPlaca + ' | ' + vNome);
  h += '<div class="modal-body">';
  h += '<p style="font-size:13px;color:#64748b;margin-bottom:12px">Confira os dados, copie e envie ao despachante.</p>';
  h += '<textarea id="atpv-text" style="width:100%;height:280px;padding:14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:monospace;line-height:1.7;resize:none">' + texto + '<\/textarea>';
  h += '<div class="modal-foot">';
  h += '<button class="btn btns" onclick="closeModal()">Fechar<\/button>';
  h += '<button class="btn btns" id="btn-copy" onclick="copyAtpv()">Copiar Texto<\/button>';
  h += '<button class="btn btnp" data-sid="' + saleId + '" onclick="markAndSendAtpv(this)">Marcar como ATPV Enviado<\/button>';
  h += '<\/div><\/div>';

  openModal(h, 'modal-md');
}


function markAndSendAtpv(btn) {
  var sid = btn.getAttribute('data-sid');
  markFluxoStep(sid, 'atpv');
  updDesp(sid, 'ATPV Enviado');
  closeModal();
  rDesp();
}

function copyAtpv() {
  var el = document.getElementById('atpv-text');
  if (!el) return;
  el.select();
  document.execCommand('copy');
  var btn = document.getElementById('btn-copy');
  if (btn) { btn.textContent = 'Copiado!'; btn.style.background = '#22c55e'; btn.style.color = 'white'; }
  setTimeout(function(){ if(btn){btn.textContent='Copiar Texto';btn.style.background='';btn.style.color='';} }, 2000);
}



// Auto-generate monthly salary + ajuda de custo if not yet launched
function checkMonthlyPayroll() {
  var now = new Date();
  var mesAno = now.getFullYear() + '-' + (String(now.getMonth()+1).padStart(2,'0'));
  var mesLabel = String(now.getMonth()+1).padStart(2,'0') + '/' + now.getFullYear();

  DB.employees.forEach(function(emp) {
    var name = emp.name;
    if (!emp.salary && !emp.benefit) return;

    // Check if salary already launched this month
    var jaTemSal = DB.payLogs.some(function(l){
      return l.emp === name && l.type === 'Salario' && l.date && l.date.indexOf(mesAno) === 0;
    });
    var jaTemAjuda = DB.payLogs.some(function(l){
      return l.emp === name && l.type === 'Aj.Custo' && l.date && l.date.indexOf(mesAno) === 0;
    });

    if (!jaTemSal && emp.salary > 0) {
      var salLog = { emp: name, date: mesAno+'-01', desc: 'Salario ' + mesLabel, value: emp.salary, type: 'Salario', status: 'Pendente' };
      if (supaConfigured()) {
        supaInsert('payment_logs', { employee_name: name, date: salLog.date, description: salLog.desc, value: salLog.value, type: 'Salario' }).then(function(r){
          var saved = Array.isArray(r)?r[0]:r;
          salLog.id = saved ? saved.id : nextId(DB.payLogs);
          DB.payLogs.push(salLog);
        });
      } else {
        salLog.id = nextId(DB.payLogs);
        DB.payLogs.push(salLog);
      }
    }

    if (!jaTemAjuda && emp.benefit > 0) {
      var ajLog = { emp: name, date: mesAno+'-01', desc: 'Aj.Custo ' + mesLabel, value: emp.benefit, type: 'Aj.Custo', status: 'Pendente' };
      if (supaConfigured()) {
        supaInsert('payment_logs', { employee_name: name, date: ajLog.date, description: ajLog.desc, value: ajLog.value, type: 'Aj.Custo' }).then(function(r){
          var saved = Array.isArray(r)?r[0]:r;
          ajLog.id = saved ? saved.id : nextId(DB.payLogs);
          DB.payLogs.push(ajLog);
        });
      } else {
        ajLog.id = nextId(DB.payLogs);
        DB.payLogs.push(ajLog);
      }
    }
  });
}
