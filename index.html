<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Auto Money CRM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Segoe UI,sans-serif;background:#f1f5f9;color:#1e293b;}
.hidden{display:none!important;}
.lbg{min-height:100vh;background:linear-gradient(135deg,#1e293b,#0f172a,#14532d);display:flex;align-items:center;justify-content:center;}
.lbox{background:white;border-radius:20px;padding:40px;width:360px;box-shadow:0 25px 80px rgba(0,0,0,.4);}
.llogo{text-align:center;margin-bottom:28px;}
.llogo p{color:#64748b;font-size:14px;margin-top:8px;}
.lf label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;}
.lf input,.lf select{width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;margin-bottom:14px;font-family:inherit;outline:none;}
.lbtn{width:100%;padding:13px;background:#22c55e;color:white;border:none;border-radius:10px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;}
.lbtn:hover{background:#16a34a;}

#app{display:flex;min-height:100vh;}
#sidebar{width:240px;background:#1e293b;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:width .25s;overflow:hidden;}
#sidebar.col{width:64px;}
.shead{padding:16px 12px;border-bottom:1px solid #334155;display:flex;flex-direction:column;align-items:center;gap:8px;}
.logowr{display:flex;justify-content:center;width:100%;}
#sidebar.col .logowr,.nlabel,#sidebar.col .uname,#sidebar.col .urole,#sidebar.col .ltxt{display:none;}
.menbtn{background:none;border:none;color:#94a3b8;cursor:pointer;padding:4px;align-self:flex-end;}
#sidebar.col .menbtn{align-self:center;}
nav{flex:1;padding:12px 8px;overflow-y:auto;}
.nitem{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:none;background:transparent;color:#94a3b8;cursor:pointer;margin-bottom:2px;transition:all .15s;white-space:nowrap;font-family:inherit;text-align:left;}
.nitem:hover{background:#334155;color:white;}
.nitem.active{background:#22c55e;color:white;}
.nlabel{font-size:14px;font-weight:500;}
.nitem.active .nlabel{font-weight:700;}
#sidebar.col .nitem{justify-content:center;padding:10px;}
.sfoot{padding:12px 8px;border-top:1px solid #334155;}
.urow{display:flex;align-items:center;gap:10px;padding:8px 12px;}
.uav{width:32px;height:32px;border-radius:50%;background:#22c55e30;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#22c55e;flex-shrink:0;}
.lgbtn{width:100%;display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;border:none;background:transparent;color:#64748b;cursor:pointer;font-size:13px;font-family:inherit;}
.lgbtn:hover{color:white;}
#sidebar.col .lgbtn{justify-content:center;}
#main{margin-left:240px;transition:margin-left .25s;flex:1;display:flex;flex-direction:column;}
#main.exp{margin-left:64px;}
.topbar{background:white;border-bottom:1px solid #e5e7eb;padding:12px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.content{padding:28px;flex:1;}
.page{display:none;}
.page.active{display:block;}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.ptitle{font-size:22px;font-weight:800;}
.psub{font-size:14px;color:#64748b;margin-top:4px;}
.btn{display:inline-flex;align-items:center;gap:6px;border-radius:8px;cursor:pointer;font-weight:600;white-space:nowrap;border:none;font-family:inherit;}
.btnp{background:#22c55e;color:white;padding:10px 20px;font-size:14px;}
.btns{background:white;color:#374151;padding:10px 20px;font-size:14px;border:1.5px solid #e5e7eb!important;}
.btnd{background:#fee2e2;color:#dc2626;padding:7px 10px;font-size:13px;}
.btng{background:none;color:#64748b;padding:7px 8px;font-size:13px;}
.btn:hover{opacity:.85;}
.tw{background:white;border-radius:12px;border:1px solid #e5e7eb;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.tbar{padding:16px 20px;border-bottom:1px solid #f1f5f9;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{padding:12px 16px;text-align:left;font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #e5e7eb;white-space:nowrap;background:#f8fafc;}
td{padding:12px 16px;border-bottom:1px solid #f1f5f9;white-space:nowrap;color:#1e293b;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:#f8fafc;}
.bk{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;}
.bg{background:#dcfce7;color:#15803d;}
.by{background:#fef9c3;color:#854d0e;}
.bb{background:#dbeafe;color:#1d4ed8;}
.br{background:#fee2e2;color:#dc2626;}
.bgr{background:#f1f5f9;color:#475569;}
.bpu{background:#f3e8ff;color:#7e22ce;}
.bo{background:#ffedd5;color:#c2410c;}

.modal{background:white;border-radius:12px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-md{max-width:600px;}
.modal-lg{max-width:820px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #e5e7eb;background:#f8fafc;position:sticky;top:0;z-index:5;}
.modal-head h3{font-size:18px;font-weight:700;}
.modal-body{padding:24px;}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;border-top:1px solid #f1f5f9;padding-top:16px;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;color:#1e293b;background:white;outline:none;font-family:inherit;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#22c55e;}
.fg textarea{resize:vertical;min-height:70px;}
.req{color:#ef4444;margin-left:2px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:24px;}
.scard{background:white;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid #f1f5f9;display:flex;align-items:center;gap:16px;}
.sicon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sval{font-size:22px;font-weight:800;line-height:1.2;}
.slbl{font-size:13px;color:#64748b;font-weight:500;}
.ssub{font-size:12px;color:#94a3b8;margin-top:2px;}
.tcol2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}
.tpills{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.tpill{padding:9px 18px;border-radius:8px;border:1.5px solid #e5e7eb;background:white;color:#374151;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.tpill.active{background:#22c55e;border-color:#22c55e;color:white;}
.fpill{padding:7px 14px;border-radius:20px;border:1.5px solid #e5e7eb;background:white;color:#374151;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.fpill.active{background:#22c55e;border-color:#22c55e;color:white;}
.srch{position:relative;flex:1;min-width:200px;}
.srch input{width:100%;padding:8px 12px 8px 34px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;}
.srchico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;}
.ecards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.ecard{background:white;border-radius:12px;padding:20px;border:2px solid #e5e7eb;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;}
.ecard:hover{border-color:#22c55e;}
.estats{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;margin-top:14px;}
.estat{background:#f8fafc;padding:8px 10px;border-radius:8px;}
.elbl{color:#64748b;font-size:12px;}
.eval{font-weight:700;margin-top:2px;}
.pb{height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden;margin-top:4px;}
.pf{height:100%;border-radius:4px;}
.infobox{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 16px;font-size:14px;margin:8px 0;}
.lockscr{text-align:center;padding:80px 20px;color:#94a3b8;}
.chklist{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.chkitem{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;}
.chkitem.chked{border-color:#22c55e;background:#f0fdf4;}
input[type=checkbox]{width:16px;height:16px;accent-color:#22c55e;}
@media(max-width:768px){
#sidebar{width:64px!important;}
#sidebar .logowr,.nlabel,.uname,.urole,.ltxt{display:none!important;}
#sidebar .nitem{justify-content:center;padding:10px;}
#main{margin-left:64px!important;}
.fgrid,.tcol2{grid-template-columns:1fr;}
.sg{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<script>
// ============================================================
// SUPABASE CONFIG — substitua pelos seus valores
// ============================================================
var SUPA_URL = 'https://zpmjhtanbxegtjybyvtn.supabase.co';   // ex: https://xyzabc.supabase.co
var SUPA_KEY = 'sb_publishable_-3gsXaOaEA4x_Da4tpO-sw_8zZBUX5u';   // anon public key

// ============================================================
// SUPABASE API — camada de acesso ao banco
// ============================================================
function supaHeaders() {
  return {
    'Content-Type': 'application/json',
    'apikey': SUPA_KEY,
    'Authorization': 'Bearer ' + SUPA_KEY,
    'Prefer': 'return=representation'
  };
}

function supaGet(table, params) {
  var url = SUPA_URL + '/rest/v1/' + table + '?order=created_at.asc';
  if (params) url += '&' + params;
  return fetch(url, { headers: supaHeaders() }).then(function(r) { return r.json(); });
}

function supaInsert(table, data) {
  return fetch(SUPA_URL + '/rest/v1/' + table, {
    method: 'POST',
    headers: supaHeaders(),
    body: JSON.stringify(data)
  }).then(function(r) { return r.json(); });
}

function supaUpdate(table, id, data) {
  return fetch(SUPA_URL + '/rest/v1/' + table + '?id=eq.' + id, {
    method: 'PATCH',
    headers: supaHeaders(),
    body: JSON.stringify(data)
  }).then(function(r) { return r.json(); });
}

function supaDelete(table, id) {
  return fetch(SUPA_URL + '/rest/v1/' + table + '?id=eq.' + id, {
    method: 'DELETE',
    headers: supaHeaders()
  });
}

function supaLogin(username, pass) {
  return fetch(SUPA_URL + '/rest/v1/system_users?username=eq.' + username + '&password_hash=eq.' + pass + '&select=username,role', {
    headers: supaHeaders()
  }).then(function(r) { return r.json(); });
}

// Verifica se Supabase esta configurado
function supaConfigured() {
  return SUPA_URL !== '' && SUPA_KEY !== '';
}

// ============================================================
// CARREGAMENTO DOS DADOS
// ============================================================
function loadAllData(callback) {
  if (!supaConfigured()) {
    // Modo offline — usa dados locais do DB
    callback();
    return;
  }
  showLoading(true);
  Promise.all([
    supaGet('vehicles'),
    supaGet('clients'),
    supaGet('sales'),
    supaGet('expenses'),
    supaGet('employees'),
    supaGet('payment_logs'),
    supaGet('leads'),
    supaGet('appointments'),
    supaGet('suppliers')
  ]).then(function(results) {
    if (results[0] && !results[0].error) DB.vehicles    = results[0].map(mapVehicle);
    if (results[1] && !results[1].error) DB.clients     = results[1].map(mapClient);
    if (results[2] && !results[2].error) DB.sales       = results[2].map(mapSale);
    if (results[3] && !results[3].error) DB.expenses    = results[3].map(mapExpense);
    if (results[4] && !results[4].error) DB.employees   = results[4].map(mapEmployee);
    if (results[5] && !results[5].error) DB.payLogs     = results[5].map(mapPayLog);
    if (results[6] && !results[6].error) DB.leads       = results[6].map(mapLead);
    if (results[7] && !results[7].error) DB.appointments = results[7].map(mapAppt);
    if (results[8] && !results[8].error) DB.suppliers   = results[8].map(mapSupplier);
    showLoading(false);
    callback();
  }).catch(function(e) {
    console.error('Erro ao carregar dados:', e);
    showLoading(false);
    callback();
  });
}

function showLoading(show) {
  var el = document.getElementById('loading-overlay');
  if (el) el.style.display = show ? 'flex' : 'none';
}

// Mappers — converte nomes do banco (snake_case) para o JS (camelCase)
function mapVehicle(r) { return { id:r.id, brand:r.brand, model:r.model, year:r.year, plate:r.plate, color:r.color, chassis:r.chassis, renavam:r.renavam, owner:r.owner, ownerName:r.owner_name, entryValue:r.entry_value, saleValue:r.sale_value, expenses:r.expenses, status:r.status, entryType:r.entry_type, mileage:r.mileage }; }
function mapClient(r)  { return { id:r.id, name:r.name, cpf:r.cpf, phone:r.phone, email:r.email, address:r.address, city:r.city, type:r.type }; }
function mapSale(r)    { return { id:r.id, vehicleId:r.vehicle_id, clientId:r.client_id, seller:r.seller, saleDate:r.sale_date, saleValue:r.sale_value, payMethod:r.pay_method, bankName:r.bank_name, commission:r.commission, transferType:r.transfer_type, desp:r.despachante, status:r.status }; }
function mapExpense(r) { return { id:r.id, cat:r.category, desc:r.description, value:r.value, date:r.date, type:r.type, paid:r.paid }; }

function isG() { return CUR.role === 'gestor'; }
function fmt(v) { return 'R$ ' + Number(v || 0).toLocaleString('pt-BR'); }
function calcComm(v) { v = Number(v); return v <= 50000 ? 500 : v * 0.01; }
function td() { return new Date().toISOString().split('T')[0]; }
function fmtD(d) { if (!d) return ''; var p = d.split('-'); return p[2] + '/' + p[1] + '/' + p[0]; }
function nextId(arr) { if (!arr.length) return 1; return Math.max.apply(null, arr.map(function(x) { return x.id; })) + 1; }
function gv(id) { var e = document.getElementById(id); return e ? e.value : ''; }
function bk(label, cls) { return '<span class="bk ' + cls + '">' + label + '</span>'; }

function vbk(s) {
  if (s === 'Disponivel') return bk(s, 'bg');
  if (s === 'Em Preparacao') return bk(s, 'by');
  if (s === 'Anunciado') return bk(s, 'bb');
  if (s === 'Vendido') return bk(s, 'bgr');
  return bk(s, 'bo');
}

function lbk(s) {
  if (s === 'Novo') return bk(s, 'bg');
  if (s === 'Em contato') return bk(s, 'bb');
  if (s === 'Negociando') return bk(s, 'by');
  if (s === 'Agendado') return bk(s, 'bpu');
  if (s === 'Perdido') return bk(s, 'br');
  return bk(s, 'bgr');
}

// ---------- AUTH ----------
function doLogin() {
  var u = document.getElementById('sel-user').value;
  var p = document.getElementById('inp-pass').value;

  function enterApp(username, role) {
    CUR.user = username;
    CUR.role = role;
    document.getElementById('login-page').classList.add('hidden');
    var appEl = document.getElementById('app');
    appEl.classList.remove('hidden');
    appEl.style.display = 'flex';
    document.getElementById('user-av').textContent = username[0];
    document.getElementById('top-av').textContent = username[0];
    document.getElementById('user-nm').textContent = username;
    document.getElementById('user-rl').textContent = role;
    document.getElementById('top-date').textContent = new Date().toLocaleDateString('pt-BR');
    loadAllData(function() {
      buildNav();
      showPage('dashboard');
    });
  }

  if (supaConfigured()) {
    // Login via Supabase
    var btn = document.getElementById('btn-login');
    btn.textContent = 'Entrando...';
    btn.disabled = true;
    supaLogin(u, p).then(function(result) {
      btn.textContent = 'Entrar';
      btn.disabled = false;
      if (result && result.length > 0) {
        enterApp(result[0].username, result[0].role);
      } else {
        alert('Senha incorreta.');
      }
    }).catch(function() {
      btn.textContent = 'Entrar';
      btn.disabled = false;
      alert('Erro de conexao. Tente novamente.');
    });
  } else {
    // Modo offline (sem Supabase configurado)
    if (!USERS[u]) { alert('Usuario invalido.'); return; }
    if (p !== USERS[u].pass && p !== '') { alert('Senha incorreta.'); return; }
    enterApp(u, USERS[u].role);
  }
}

function doLogout() {
  document.getElementById('login-page').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('app').style.display = 'none';
  document.getElementById('inp-pass').value = '';
  CUR.user = ''; CUR.role = '';
}

function svgIcon(name, size, color) {
  size = size || 18; color = color || 'currentColor';
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="' + (ICONS[name] || '') + '"/></svg>';
}

function buildNav() {
  var h = '';
  NAV.forEach(function(n) {
    var ok = isG() || n.roles.indexOf(CUR.role) > -1;
    var ac = CUR.page === n.id ? ' active' : '';
    var fn = ok ? 'showPage(\'' + n.id + '\')' : '';
    h += '<button class="nitem' + ac + '" onclick="' + fn + '" title="' + n.label + '">';
    h += svgIcon(n.id, 18);
    h += '<span class="nlabel">' + n.label + (ok ? '' : ' (restrito)') + '</span>';
    h += '</button>';
  });
  document.getElementById('nav-items').innerHTML = h;
}

// ---------- MODAL ----------
function openModal(html, size) {
  var d = document.createElement('div');
  d.className = 'modal-bg';
  d.id = 'modal-bg';
  d.innerHTML = '<div class="modal ' + (size || 'modal-md') + '">' + html + '</div>';
  d.addEventListener('click', function(e) { if (e.target === d) closeModal(); });
  document.getElementById('modal-wrap').innerHTML = '';
  document.getElementById('modal-wrap').appendChild(d);
}
function closeModal() { document.getElementById('modal-wrap').innerHTML = ''; }

  return '<div class="fg"><label>' + lbl + (req ? '<span class="req">*</span>' : '') + '</label><input type="' + (type || 'text') + '" id="' + id + '" value="' + (val || '') + '"/></div>';

// ---------- STAT CARD ----------
function scard(icon, lbl, val, sub, color) {
  return '<div class="scard"><div class="sicon" style="background:' + color + '20">' + svgIcon(icon, 24, color) + '</div><div><div class="sval">' + val + '</div><div class="slbl">' + lbl + '</div><div class="ssub">' + sub + '</div></div></div>';
}

// ---------- TABLE ----------
function mkTable(cols, rows, actionsFn) {
  var h = '<table><thead><tr>';
  cols.forEach(function(c) { h += '<th>' + c + '</th>'; });
  if (actionsFn) h += '<th style="text-align:right">Acoes</th>';
  h += '</tr></thead><tbody>';
  if (!rows || !rows.length) {
    h += '<tr><td colspan="' + (cols.length + (actionsFn ? 1 : 0)) + '" style="text-align:center;padding:32px;color:#94a3b8">Nenhum registro</td></tr>';
  } else {
    rows.forEach(function(r) {
      h += '<tr>';
      r.cells.forEach(function(c) { h += '<td>' + c + '</td>'; });
      if (actionsFn) h += '<td style="text-align:right">' + actionsFn(r.data) + '</td>';
      h += '</tr>';
    });
  }
  h += '</tbody></table>';
  return h;
}

    h += '<div class="ecards">';
    DB.employees.forEach(function(e) {
      var logs = DB.payLogs.filter(function(l) { return l.emp === e.name; });
      var tot = logs.reduce(function(a, l) { return a + l.value; }, 0);
      var rc = { 'Gestor':'bg','Gestora':'bg','Consignadora':'bpu','Vendedor':'bb','Preparador':'bgr' };
      h += '<div class="ecard" onclick="empTab2=\'extrato\';selEmp=\'' + e.name + '\';rEmployees()">';
      h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">';
      h += '<div style="width:44px;height:44px;border-radius:50%;background:#22c55e20;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#22c55e">' + e.name[0] + '</div>';
      h += '<div><div style="font-weight:800;font-size:15px">' + e.name + '</div>' + bk(e.role, rc[e.role]||'bgr') + '</div></div>';
      h += '<div class="estats">';
      if (e.salary > 0) h += '<div class="estat"><div class="elbl">Salario Base</div><div class="eval">' + fmt(e.salary) + '</div></div>';
      if (e.helpCost > 0) h += '<div class="estat"><div class="elbl">Aj. Custo</div><div class="eval">' + fmt(e.helpCost) + '</div></div>';
      if (e.sales > 0) h += '<div class="estat" style="background:#dbeafe"><div class="elbl">Vendas</div><div class="eval" style="color:#1d4ed8">' + e.sales + '</div></div>';
      if (tot > 0) h += '<div class="estat" style="background:#f0fdf4"><div class="elbl">Total Pago</div><div class="eval" style="color:#22c55e">' + fmt(tot) + '</div></div>';
      h += '</div><div style="margin-top:10px;font-size:12px;color:#22c55e;text-align:right">Ver extrato &rarr;</div>';
      h += '</div>';
    });
    h += '</div>';
  } else {
    var eOpts = '<option value="">Todos</option>' + DB.employees.map(function(e) { return '<option value="'+e.name+'"'+(selEmp===e.name?' selected':'')+'>'+e.name+'</option>'; }).join('');
    h += '<div style="display:flex;gap:12px;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap">';
    h += '<div class="fg" style="margin:0;flex:1;min-width:180px"><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:4px">Funcionario</label>';
    h += '<select onchange="selEmp=this.value||null;rEmployees()" style="width:100%;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit">' + eOpts + '</select></div>';
    h += '<button class="btn btnp" onclick="openPayModal()">+ Lancar</button></div>';
    var logs = selEmp ? DB.payLogs.filter(function(l) { return l.emp === selEmp; }) : DB.payLogs;
    logs = logs.slice().sort(function(a, b) { return b.date.localeCompare(a.date); });
    var totF = logs.reduce(function(a, l) { return a + l.value; }, 0);
    h += '<div class="infobox" style="display:flex;justify-content:space-between;margin-bottom:16px"><span>' + logs.length + ' lancamentos' + (selEmp?' - '+selEmp:'') + '</span><strong style="color:#15803d">Total: ' + fmt(totF) + '</strong></div>';
    var tc = { 'Salario':'bb','Aj.Custo':'bgr','Comissao':'bg','Retirada':'by','Vale':'bo','Outros':'bgr' };
    h += '<div class="tw">';
    h += mkTable(['Data','Funcionario','Descricao','Tipo','Valor'], logs.map(function(l) {
      var p = l.date.split('-');
      return { cells: [p[2]+'/'+p[1]+'/'+p[0], '<strong>'+l.emp+'</strong>', l.desc, bk(l.type,tc[l.type]||'bgr'), '<span style="color:#22c55e;font-weight:700">'+fmt(l.value)+'</span>'], data: l };
    }));
    h += '</div>';
  }
  document.getElementById('p-employees').innerHTML = h;
}
function openPayModal() {
  var eOpts = DB.employees.map(function(e) { return '<option value="'+e.name+'"'+(selEmp===e.name?' selected':'')+'>'+e.name+'</option>'; }).join('');
  var h = mHead('Lancar Pagamento') + '<div class="modal-body"><div class="fgrid">';
  h += '<div class="fg"><label>Funcionario <span class="req">*</span></label><select id="pemp">' + eOpts + '</select></div>';
  h += fsel('ptype','Tipo','Salario',['Salario','Aj.Custo','Comissao','Retirada','Vale','Outros']);
  h += finp('pdesc','Descricao','',true) + finp('pval','Valor R$','',true,'number');
  h += finp('pdate','Data',td(),'','date');
  h += '</div><div class="modal-foot"><button class="btn btns" onclick="closeModal()">Cancelar</button><button class="btn btnp" onclick="savePay()">Lancar</button></div></div>';
  openModal(h, 'modal-md');
}
function savePay() {
  if (!gv('pemp') || !gv('pdesc') || !gv('pval')) { alert('Preencha todos os campos.'); return; }
  var obj = { emp:gv('pemp'), date:gv('pdate'), desc:gv('pdesc'), value:Number(gv('pval')), type:gv('ptype') };
  if (supaConfigured()) {
    var dbObj = { employee_name:obj.emp, date:obj.date, description:obj.desc, value:obj.value, type:obj.type };
    supaInsert('payment_logs', dbObj).then(function(r) {
      var saved = Array.isArray(r) ? r[0] : r;
      obj.id = saved.id; DB.payLogs.push(obj);
      selEmp = obj.emp; empTab2 = 'extrato';
      closeModal(); rEmployees();
    });
  } else {
    obj.id = nextId(DB.payLogs); DB.payLogs.push(obj);
    selEmp = obj.emp; empTab2 = 'extrato';
    closeModal(); rEmployees();
  }
}

// ========== DESPACHANTE ==========
var despTab2 = 'pendente';
function rDesp() {
  if (!isG()) { document.getElementById('p-despachante').innerHTML = '<div class="lockscr"><p>Acesso restrito ao gestor.</p></div>'; return; }
  var pend = DB.sales.filter(function(s) { return s.desp !== 'Concluido'; });
  var done = DB.sales.filter(function(s) { return s.desp === 'Concluido'; });
  var h = '<div class="ph"><div><h2 class="ptitle">Despachante</h2><p class="psub">Controle de transferencias</p></div></div>';
  h += '<div class="sg" style="grid-template-columns:repeat(3,1fr)">';
  h += scard('despachante','Pendentes',pend.length,'Aguardando/Em andamento','#f59e0b');
  h += scard('sales','Concluidos',done.length,'Finalizados','#22c55e');
  h += scard('dashboard','Total',DB.sales.length,'Transferencias','#3b82f6');
  h += '</div>';
  h += '<div class="tpills">';
  h += '<button class="tpill'+(despTab2==='pendente'?' active':'')+'" onclick="despTab2=\'pendente\';rDesp()">Pendentes ('+pend.length+')</button>';
  h += '<button class="tpill'+(despTab2==='concluido'?' active':'')+'" onclick="despTab2=\'concluido\';rDesp()">Concluidos ('+done.length+')</button>';
  h += '<button class="tpill'+(despTab2==='todos'?' active':'')+'" onclick="despTab2=\'todos\';rDesp()">Todos</button>';
  h += '</div>';
  var show = despTab2==='pendente' ? pend : despTab2==='concluido' ? done : DB.sales;
  var dm = { 'Concluido':'bg','Em andamento':'bb','Aguardando':'by' };
  h += '<div class="tw">';
  if (!show.length) {
    h += '<div style="padding:40px;text-align:center;color:#94a3b8">Nenhuma transferencia ' + (despTab2==='pendente'?'pendente!':'aqui.') + '</div>';
  } else {
    h += mkTable(['Data','Placa','Veiculo','Comprador','Transferencia','Status'], show.map(function(s) {
      var veh = DB.vehicles.find(function(v) { return v.id === s.vehicleId; });
      var cli = DB.clients.find(function(c) { return c.id === s.clientId; });
      return { cells: [s.saleDate, veh?'<strong style="color:#22c55e">'+veh.plate+'</strong>':'-', veh?veh.brand+' '+veh.model+' '+veh.year:'-', cli?cli.name:'-', bk(s.transferType,s.transferType==='Cortesia'?'bg':'bb'), bk(s.desp,dm[s.desp]||'bgr')], data: s };
    }), function(s) {
      var opts = ['Aguardando','Em andamento','Concluido'].map(function(o) { return '<option value="'+o+'"'+(s.desp===o?' selected':'')+'>'+o+'</option>'; }).join('');
      return '<select onchange="updDesp('+s.id+',this.value)" style="padding:5px 8px;border:1.5px solid #e5e7eb;border-radius:6px;font-size:12px;font-family:inherit">' + opts + '</select>';
    });
  }
  h += '</div>';
  document.getElementById('p-despachante').innerHTML = h;
}
function updDesp(id, val) {
  DB.sales = DB.sales.map(function(s) { return s.id===id ? Object.assign({},s,{desp:val}) : s; });
  if (supaConfigured()) supaUpdate('sales', id, { despachante:val });
  rDesp();
}

// ========== AGENDA ==========
var ATYPES = ['Reuniao','Test Drive','Entrega','Preparacao','Despachante','Vistoria','Outro'];
function rAgenda() {
  var mine = isG() ? DB.appointments : DB.appointments.filter(function(a) { return a.person === CUR.user; });
  var h = '<div class="ph"><div><h2 class="ptitle">Agenda</h2><p class="psub">Compromissos de ' + CUR.user + '</p></div>';
  h += '<button class="btn btnp" onclick="openApptModal()">+ Novo</button></div>';
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">';
  if (!mine.length) { h += '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#94a3b8"><p>Nenhum compromisso agendado</p></div>'; }
  mine.sort(function(a,b) { return a.date.localeCompare(b.date); }).forEach(function(a) {
    h += '<div style="background:white;border-radius:12px;padding:18px;border:1px solid #e5e7eb;box-shadow:0 1px 4px rgba(0,0,0,.06)">';
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px"><strong style="font-size:15px">' + a.title + '</strong>' + bk(a.type,'bb') + '</div>';
    h += '<div style="font-size:13px;color:#64748b">Data: ' + a.date + ' | Hora: ' + a.time + '</div>';
    if (a.notes) h += '<div style="margin-top:8px;font-size:13px;color:#94a3b8;background:#f8fafc;padding:6px 10px;border-radius:6px">' + a.notes + '</div>';
    h += '<div style="margin-top:10px;font-size:12px;color:#22c55e;font-weight:600">Responsavel: ' + a.person + '</div></div>';
  });
  h += '</div>';
  document.getElementById('p-agenda').innerHTML = h;
}
function openApptModal() {
  var eOpts = DB.employees.map(function(e) { return '<option'+(e.name===CUR.user?' selected':'')+'>'+e.name+'</option>'; }).join('');
  var h = mHead('Novo Compromisso') + '<div class="modal-body"><div class="fgrid">';
  h += finp('atitle','Titulo','',true);
  h += finp('adate','Data',td(),'','date') + finp('atime','Horario','09:00','','time');
  h += fsel('atype','Tipo','Reuniao',ATYPES);
  h += '<div class="fg"><label>Responsavel</label><select id="aperson">' + eOpts + '</select></div>';
  h += '</div><div class="fg"><label>Observacoes</label><textarea id="anotes"><\/textarea></div>';
  h += '<div class="modal-foot"><button class="btn btns" onclick="closeModal()">Cancelar</button><button class="btn btnp" onclick="saveAppt()">Agendar</button></div></div>';
  openModal(h, 'modal-md');
}
function saveAppt() {
  if (!gv('atitle')) { alert('Informe o titulo.'); return; }
  var obj = { title:gv('atitle'), date:gv('adate'), time:gv('atime'), person:gv('aperson'), type:gv('atype'), notes:gv('anotes') };
  if (supaConfigured()) {
    supaInsert('appointments', obj).then(function(r) {
      var saved = Array.isArray(r) ? r[0] : r;
      obj.id = saved.id; DB.appointments.push(obj);
      closeModal(); rAgenda();
    });
  } else {
    obj.id = nextId(DB.appointments); DB.appointments.push(obj);
    closeModal(); rAgenda();
  }
}

// ========== SUPPLIERS ==========
var SCATS = ['Pecas','Lataria/Pintura','Eletrica','Mecanica','Despachante','Higienizacao','Outros'];
function rSup() {
  var h = '<div class="ph"><div><h2 class="ptitle">Fornecedores</h2><p class="psub">Prestadores de servicos</p></div>';
  h += '<button class="btn btnp" onclick="openSupModal()">+ Novo</button></div>';
  h += '<div class="tw">';
  h += mkTable(['Nome','Categoria','CNPJ','Telefone','Contato'], DB.suppliers.map(function(s) {
    return { cells: ['<strong>'+s.name+'</strong>', bk(s.cat,'bb'), s.cnpj, s.phone, s.contact], data: s };
  }));
  h += '</div>';
  document.getElementById('p-suppliers').innerHTML = h;
}
function openSupModal() {
  var h = mHead('Novo Fornecedor') + '<div class="modal-body"><div class="fgrid">';
  h += finp('sname','Nome','',true);
  h += fsel('scat','Categoria','Pecas',SCATS);
  h += finp('scnpj','CNPJ','') + finp('sphone','Telefone','');
  h += finp('scontact','Contato','');
  h += '</div><div class="modal-foot"><button class="btn btns" onclick="closeModal()">Cancelar</button><button class="btn btnp" onclick="saveSup()">Cadastrar</button></div></div>';
  openModal(h, 'modal-md');
}
function saveSup() {
  if (!gv('sname')) { alert('Nome obrigatorio.'); return; }
  var obj = { name:gv('sname'), cat:gv('scat'), cnpj:gv('scnpj'), phone:gv('sphone'), contact:gv('scontact') };
  if (supaConfigured()) {
    var dbObj = { name:obj.name, category:obj.cat, cnpj:obj.cnpj, phone:obj.phone, contact:obj.contact };
    supaInsert('suppliers', dbObj).then(function(r) {
      var saved = Array.isArray(r) ? r[0] : r;
      obj.id = saved.id; DB.suppliers.push(obj);
      closeModal(); rSup();
    });
  } else {
    obj.id = nextId(DB.suppliers); DB.suppliers.push(obj);
    closeModal(); rSup();
  }
}

// ========== INIT ==========
document.getElementById('btn-login').onclick = doLogin;
document.getElementById('inp-pass').onkeydown = function(e) { if (e.key === 'Enter') doLogin(); };
document.getElementById('btn-menu').onclick = toggleSide;
document.getElementById('btn-logout').onclick = doLogout;
document.getElementById('top-date').textContent = new Date().toLocaleDateString('pt-BR');

</script>
</body>
